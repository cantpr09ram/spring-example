spring.application.name=example

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/app}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:app}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:app}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

app.security.jwt.secret=${APP_SECURITY_JWT_SECRET:dev-secret-change-me-please-32-bytes!!}
app.security.jwt.expires-in-seconds=${APP_SECURITY_JWT_EXPIRES_IN_SECONDS:3600}
app.security.bootstrap-admin.enabled=${APP_SECURITY_BOOTSTRAP_ADMIN_ENABLED:true}
app.security.bootstrap-admin.email=${APP_SECURITY_BOOTSTRAP_ADMIN_EMAIL:admin@example.com}
app.security.bootstrap-admin.password=${APP_SECURITY_BOOTSTRAP_ADMIN_PASSWORD:admin12345}
app.security.bootstrap-admin.display-name=${APP_SECURITY_BOOTSTRAP_ADMIN_DISPLAY_NAME:Admin}
